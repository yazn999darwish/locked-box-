name: "Godot Android Cloud Build"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK Paths
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH

      - name: Create Required Directories
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.android
          mkdir -p build/android
          mkdir -p ~/.local/share/godot/export_templates

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          cd /tmp
          wget -q https://github.com/godotengine/godot-releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip -q Godot_v4.5.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf /tmp/templates /tmp/Godot_v4.5.1-stable_export_templates.tpz

      - name: Start ADB Server
        run: adb start-server || true

      - name: Export Android APK
        run: godot --headless --export-debug "Android" build/android/game.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-Game
          path: build/android/game.apk
          retention-days: 30
