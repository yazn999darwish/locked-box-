name: "Godot Android Cloud Build"

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة الجافا JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. إنشاء المجلدات المطلوبة للنظام
      - name: Create Required Directories
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.android

      # 4. توليد ملف keystore الرقمي في المسار الافتراضي للنظام
      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 5. ضبط مسار الـ SDK والمفاتيح عالمياً داخل إعدادات جودو
      - name: Configure Godot Android Editor Settings
        run: |
          cat << 'EOF' > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_username = "androiddebugkey"
          export/android/debug_password = "android"
          EOF

      # 6. تثبيت محرك Godot الاصدار المتوافق مع مشروعك
      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      # 7. تحميل وفك قوالب التصدير للأندرويد سحابياً
      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip Godot_v4.5.1-stable_export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf /tmp/godot_templates Godot_v4.5.1-stable_export_templates.tpz

      # 8. الفحص والحقن القسري الكامل لبيانات التكوين والمعماريات في ملف التصدير
      - name: Auto Fix Export Presets Config
        shell: python
        run: |
          import os
          preset_path = "export_presets.cfg"
          if os.path.exists(preset_path):
              with open(preset_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              output = []
              in_android = False
              forced_keys = {
                  'package/unique_name': '"com.yazn.mutasmproject"',
                  'custom_template/use_custom_build': 'false',
                  'keystore/debug': '"/home/runner/.android/debug.keystore"',
                  'keystore/debug_user': '"androiddebugkey"',
                  'keystore/debug_password': '"android"',
                  'architectures/armeabi-v7a': 'true',
                  'architectures/arm64-v8a': 'true',
                  'architectures/x86': 'false',
                  'architectures/x86_64': 'false'
              }
              seen_keys = set()
              
              for line in lines:
                  line_strip = line.strip()
                  if line_strip.startswith("[preset."):
                      if in_android:
                          for k, v in forced_keys.items():
                              if k not in seen_keys:
                                  output.append(f"{k}={v}\n")
                      in_android = False
                      seen_keys.clear()
                      output.append(line)
                      continue
                      
                  if line_strip == 'platform="Android"':
                      in_android = True
                      output.append(line)
                      continue
                      
                  if in_android and "=" in line:
                      key = line_strip.split("=")[0].strip()
                      if key in forced_keys:
                          output.append(f"{key}={forced_keys[key]}\n")
                          seen_keys.add(key)
                          continue
                  
                  output.append(line)
                  
              if in_android:
                  for k, v in forced_keys.items():
                      if k not in seen_keys:
                          output.append(f"{k}={v}\n")
                          
              with open(preset_path, "w", encoding="utf-8") as f:
                  f.writelines(output)
              print("export_presets.cfg forcefully updated with complete configurations.")
          else:
              print("Critical Error: export_presets.cfg not found!")

      # 9. تشغيل خادم ADB لمنع خطأ Connection refused ومنع توقف البناء
      - name: Start ADB Server
        run: adb start-server

      # 10. إنشاء مجلد المخرجات
      - name: Create Build Directory
        run: mkdir -p build/android

      # 11. تصدير ملف الـ APK بنمط التصحيح (Debug)
      - name: Export Android APK
        run: godot --headless --export-debug "Android" build/android/game.apk

      # 12. رفع ملف الـ APK لتتمكن من تحميله مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-Game
          path: build/android/game.apk
