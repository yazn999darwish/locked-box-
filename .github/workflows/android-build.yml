name: "Godot Android Cloud Build"

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة الجافا JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. ضبط مسار Android SDK بطريقة محمية تمنع أخطاء الصياغة
      - name: Configure Godot Android SDK Path
        run: |
          mkdir -p ~/.config/godot
          cat << 'EOF' > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          EOF

      # 4. تثبيت محرك Godot الاصدار المتوافق مع مشروعك
      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      # 5. تحميل وفك قوالب التصدير للأندرويد سحابياً
      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip Godot_v4.5.1-stable_export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf /tmp/godot_templates Godot_v4.5.1-stable_export_templates.tpz

      # 6. توليد ملف keystore الرقمي للتوقيع سحابياً
      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 7. فحص وتصحيح ملف إعدادات التصدير تلقائياً وتخطي حظر com.example
      - name: Auto Fix Export Presets Config
        shell: python
        run: |
          import os, re
          preset_path = "export_presets.cfg"
          if os.path.exists(preset_path):
              with open(preset_path, "r", encoding="utf-8") as f:
                  text = f.read()
              
              # تغيير اسم الحزمة لتخطي حظر التصدير في جودو
              text = re.sub(r'package/unique_name\s*=\s*".*"', 'package/unique_name="com.yazn.mutasmproject"', text)
              
              # إجبار إعدادات الـ Debug على استخدام المفتاح المولد
              text = re.sub(r'keystore/debug\s*=\s*".*"', 'keystore/debug="res://debug.keystore"', text)
              text = re.sub(r'keystore/debug_user\s*=\s*".*"', 'keystore/debug_user="androiddebugkey"', text)
              text = re.sub(r'keystore/debug_password\s*=\s*".*"', 'keystore/debug_password="android"', text)
              
              # إجبار إعدادات الـ Release أيضاً على استخدام نفس المفتاح لمنع أخطاء التكوين
              text = re.sub(r'keystore/release\s*=\s*".*"', 'keystore/release="res://debug.keystore"', text)
              text = re.sub(r'keystore/release_user\s*=\s*".*"', 'keystore/release_user="androiddebugkey"', text)
              text = re.sub(r'keystore/release_password\s*=\s*".*"', 'keystore/release_password="android"', text)
              
              with open(preset_path, "w", encoding="utf-8") as f:
                  f.write(text)
              print("export_presets.cfg updated successfully.")
          else:
              print("Warning: export_presets.cfg not found in root!")

      # 8. إنشاء مجلد المخرجات
      - name: Create Build Directory
        run: mkdir -p build/android

      # 9. تصدير ملف الـ APK بنمط التصحيح والاختبار (Debug لضمان استقرار البناء الأول)
      - name: Export Android APK
        run: godot --headless --export-debug "Android" build/android/game.apk

      # 10. رفع ملف الـ APK لتتمكن من تحميله مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-Game
          path: build/android/game.apk
