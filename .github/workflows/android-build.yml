name: "Godot Android Cloud Build"

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة الجافا JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. توليد مجلد الأندرويد ومجلد إعدادات جودو في النظام السحابي
      - name: Create Required Directories
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.android

      # 4. توليد ملف keystore الرقمي في المسار الافتراضي للنظام
      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 5. ضبط مسار الـ SDK والمفاتيح عالمياً داخل إعدادات جودو
      - name: Configure Godot Android Editor Settings
        run: |
          cat << 'EOF' > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_username = "androiddebugkey"
          export/android/debug_password = "android"
          EOF

      # 6. تثبيت محرك Godot الاصدار المتوافق مع مشروعك
      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      # 7. تحميل وفك قوالب التصدير للأندرويد سحابياً
      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz
          unzip Godot_v4.5.1-stable_export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.5.1.stable/
          rm -rf /tmp/godot_templates Godot_v4.5.1-stable_export_templates.tpz

      # 8. فحص وتصحيح ملف إعدادات التصدير وتطهيره من أي تعارض
      - name: Auto Fix Export Presets Config
        shell: python
        run: |
          import os
          preset_path = "export_presets.cfg"
          if os.path.exists(preset_path):
              with open(preset_path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              print("--- Original export_presets.cfg ---")
              print(content)
              
              lines = content.splitlines()
              updated_lines = []
              for line in lines:
                  line_strip = line.strip()
                  # تصحيح اسم الحزمة الافتراضي لمنع حظر جودو
                  if line_strip.startswith("package/unique_name="):
                      line = 'package/unique_name="com.yazn.mutasmproject"'
                  # إيقاف البناء المخصص لضمان استخدام القوالب التي قمنا بتحميلها
                  elif line_strip.startswith("custom_template/use_custom_build="):
                      line = 'custom_template/use_custom_build=false'
                  # تصفير المفاتيح داخل الإعداد ليقوم المحرك تلقائياً بالاعتماد على المفتاح العالمي المولد
                  elif line_strip.startswith("keystore/debug="):
                      line = 'keystore/debug=""'
                  elif line_strip.startswith("keystore/release="):
                      line = 'keystore/release=""'
                  updated_lines.append(line)
              
              updated_content = "\n".join(updated_lines)
              with open(preset_path, "w", encoding="utf-8") as f:
                  f.write(updated_content)
                  
              print("--- Updated export_presets.cfg ---")
              print(updated_content)
          else:
              print("Critical Warning: export_presets.cfg not found at root directory!")

      # 9. إنشاء مجلد المخرجات
      - name: Create Build Directory
        run: mkdir -p build/android

      # 10. تصدير ملف الـ APK بنمط التصحيح (Debug)
      - name: Export Android APK
        run: godot --headless --export-debug "Android" build/android/game.apk

      # 11. رفع ملف الـ APK لتتمكن من تحميله مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-Game
          path: build/android/game.apk
