workflows:
  android-godot-build:
    name: Godot 4 Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      vars:
        GODOT_VERSION: "4.4" # تأكد من مطابقة الإصدار الذي تستخدمه تماماً
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install Dependencies
        script: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          
      - name: Configure Godot Android SDK Path
        script: |
          mkdir -p ~/.config/godot
          echo '[resource]' > ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres

      - name: Download and Setup Godot Engine
        script: |
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        script: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Android APK (Debug Mode)
        script: |
          mkdir -p build/android
          # تم استبدال --export-release بـ --export-debug لاستخدام الـ keystore الافتراضي للتجربة
          godot --headless --export-debug "Android" build/android/locked-box-debug.apk

    artifacts:
      - build/android/*.apk
