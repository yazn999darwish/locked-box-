workflows:
  android-godot-build:
    name: Godot 4 Android Build
    max_build_duration: 60
    instance_type: linux_x2 # بيئة لينكس سريعة ومثالية لبناء الأندرويد
    environment:
      vars:
        GODOT_VERSION: "4.4" # ضع هنا رقم إصدارك المستقر بدقة (مثل 4.3 أو 4.4)
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Install Dependencies
        script: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          
      - name: Configure Godot Android SDK Path
        script: |
          # تعريف مسار الـ Android SDK للمحرك في ملف الإعدادات لتجنب خطأ التصدير
          mkdir -p ~/.config/godot
          echo '[resource]' > ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres

      - name: Download and Setup Godot Engine
        script: |
          # تحميل نسخة اللينكس القياسية وتشغيلها كـ Headless
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        script: |
          # تحميل قوالب التصدير وفكها في المسار الصحيح لنظام Linux
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Android APK
        script: |
          # إنشاء مجلد المخرجات وبدء التصدير عبر الـ CLI
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/locked-box.apk

    artifacts:
      - build/android/*.apk
